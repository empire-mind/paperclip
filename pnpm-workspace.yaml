packages:
  - packages/*
  - packages/adapters/*
  - packages/plugins/*
  # Keep sandbox-provider plugins installable as standalone packages without
  # forcing root pnpm-lock.yaml churn for their third-party deps.
  - "!packages/plugins/sandbox-providers/**"
  - packages/plugins/examples/*
  # Keep this smoke fixture installable as a local plugin example without
  # forcing PRs to commit pnpm-lock.yaml for a new workspace importer.
  - "!packages/plugins/examples/plugin-orchestration-smoke-example"
  - server
  - ui
  - cli

allowBuilds:
  "@embedded-postgres/darwin-arm64@18.1.0-beta.16": true
  es5-ext@0.10.64: true
  esbuild@0.18.20 || 0.25.12 || 0.27.3 || 0.28.1: true
  sharp@0.34.5: true
  sqlite3@5.1.7: true

overrides:
  "@anthropic-ai/sdk": "^0.91.1"
  "@babel/core": "^7.29.1"
  "@tootallnate/once": "^2.0.1"
  brace-expansion: "^5.0.6"
  defu: "^6.1.5"
  dompurify: "^3.4.11"
  esbuild: "^0.28.1"
  fast-uri: "^3.1.2"
  fast-xml-parser: "^5.7.0"
  form-data: "^4.0.6"
  hono: "^4.12.25"
  ip-address: "^10.1.1"
  js-yaml: "^4.1.2"
  kysely: "^0.28.17"
  lodash-es: "^4.17.24"
  mermaid: "^11.14.1"
  multer: "^2.2.0"
  path-to-regexp: "^8.4.0"
  picomatch: "^4.0.4"
  postcss: "^8.5.10"
  qs: "^6.15.2"
  react-router: "^7.15.1"
  react-router-dom: "^7.15.1"
  rollup: ">=4.59.0"
  tar: "^7.5.16"
  "undici@<7.0.0": "^6.27.0"
  "undici@>=7.0.0": "^7.28.0"
  "vite@>=6.0.0 <7.0.0": "^6.4.3"
  "vite@>=7.0.0": "^7.3.5"
  vitest: "^3.2.6"
  uuid: "^11.1.1"
  ws: "^8.21.0"

patchedDependencies:
  embedded-postgres@18.1.0-beta.16: patches/embedded-postgres@18.1.0-beta.16.patch
